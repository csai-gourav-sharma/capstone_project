server:
  port: 8084

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**

            - id: request-service
              uri: lb://request-service
              predicates:
                - Path=/api/requests/**

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

jwt:
  secret: mySuper256BitSecretKeyForJWTSigningAndValidation!

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
